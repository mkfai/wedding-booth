<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dorothy & Kenneth's Photo Booth</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdf6f0; text-align: center; color: #5d4037; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; }
        <button id="fullscreen-btn" style="display:none;"></button>

	* {
    	-webkit-user-select: none;
 	   -ms-user-select: none;
 	   user-select: none;
	}

        /* Booth Window */
        #booth-wrapper { 
            position: relative; border: 10px solid #fff; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #000; overflow: hidden; line-height: 0;
        }
        video, #preview-img { width: 100%; height: auto; display: block; }
        #preview-img { display: none; }
        #frame-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* Controls */
        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { 
            background: #d4a373; color: white; border: none; padding: 12px 25px; 
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        #switch-btn { background: #5d4037; font-size: 0.8rem; padding: 8px 15px; margin-bottom: 10px; }
        .btn-save { background: #6b8e23; }
        .btn-retake { background: #bc4b51; }
        button:disabled { background: #ccc; }

        #countdown { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 8rem; color: white; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.8); display: none; 
        }

        /* Scrollable Gallery Grid */
        .gallery { 
            margin-top: 30px; 
            border-top: 2px solid #eaddcf; 
            padding-top: 15px; 
            background: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
        }
        .gallery-title { font-size: 1rem; font-style: italic; margin-bottom: 10px; color: #8d6e63; }
        .gallery-items { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 12px; 
            max-height: 300px; 
            overflow-y: auto; 
            padding: 15px;
            border-radius: 10px;
        }
        .gallery-items img { 
            width: 100%; 
            height: auto; 
            border: 3px solid white; 
            border-radius: 5px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* PRINT OPTIMIZATION */
        @media print {
            @page { size: landscape; margin: 0; }
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .container > *:not(#booth-wrapper) { display: none !important; }
            #booth-wrapper { 
                border: none !important; box-shadow: none !important; 
                width: 100% !important; height: auto !important;
                image-rendering: -webkit-optimize-contrast;
            }
            video { display: none !important; }
            #preview-img { display: block !important; width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dorothy & Kenneth</h1>
    <p>November 1, 2026 — Capture the Moment ✨</p>   

    <button id="switch-btn">🔄 Switch Camera (Select A7C2 via Webcam Utility/Front/Back)</button>

    <div id="booth-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview-img">
        <img src="frame.png" id="frame-preview">
        <div id="countdown">3</div>
    </div>

    <div class="controls" id="main-controls">
        <button id="snap-btn">📸 Take Photo</button>
    </div>

    <div class="controls" id="review-controls" style="display:none;">
        <button class="btn-retake" id="retake-btn">🔄 Retake</button>
        <button class="btn-save" id="save-btn">💾 Keep, Save & Print</button>
    </div>

    <div class="gallery">
        <div class="gallery-title">Recent Gallery (Last 20 Photos)</div>
        <div class="gallery-items" id="gallery-items"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <img src="frame.png" id="frame-source" style="display:none;">
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('preview-img');
    const snapBtn = document.getElementById('snap-btn');
    const saveBtn = document.getElementById('save-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const switchBtn = document.getElementById('switch-btn');
    const countdownEl = document.getElementById('countdown');
    const frameImg = document.getElementById('frame-source');
    const galleryContainer = document.getElementById('gallery-items');
    
    let currentStream;
    let useFrontCamera = true;
    let lastCaptureData = null;
    let savedPhotos = []; // Stores the last 20 images

    // Audio Context for beeps
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = freq;
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    async function initCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        // Force High Res for Sony A7C2
        const constraints = { 
            video: { 
                width: { ideal: 3840, min: 1280 }, 
                height: { ideal: 2160, min: 720 },
                facingMode: useFrontCamera ? "user" : "environment" 
            } 
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
        } catch (e) {
            console.error(e);
            alert("Camera Error. Check USB connection or HTTPS.");
        }
    }

    switchBtn.addEventListener('click', () => {
        useFrontCamera = !useFrontCamera;
        initCamera();
    });

    snapBtn.addEventListener('click', () => {
        let count = 3;
        snapBtn.disabled = true;
        countdownEl.style.display = 'block';
        countdownEl.innerText = count;
        
        const timer = setInterval(() => {
            if (count > 1) {
                playSound(440, 0.1); 
                count--;
                countdownEl.innerText = count;
            } else {
                clearInterval(timer);
                countdownEl.style.display = 'none';
                playSound(880, 0.2); 
                capture();
            }
        }, 1000);
    });

    function capture() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        ctx.save();
        if (useFrontCamera) {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        
        if (frameImg.complete) {
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }
        
        // Export at Max Quality for printing
        lastCaptureData = canvas.toDataURL("image/jpeg", 1.0);
        previewImg.src = lastCaptureData;
        
        previewImg.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('main-controls').style.display = 'none';
        document.getElementById('review-controls').style.display = 'flex';
    }

    saveBtn.addEventListener('click', () => {
        // 1. Trigger Download
        const link = document.createElement('a');
        link.download = `Wedding_${Date.now()}.jpg`;
        link.href = lastCaptureData;
        link.click();

        // 2. Update Gallery Array (Limit 20)
        savedPhotos.unshift(lastCaptureData);
        if (savedPhotos.length > 20) savedPhotos.pop();
        updateGallery();

        // 3. Open Print Dialog
        window.print();

        reset();
    });

    retakeBtn.addEventListener('click', reset);

    function reset() {
        previewImg.style.display = 'none';
        video.style.display = 'block';
        document.getElementById('main-controls').style.display = 'flex';
        document.getElementById('review-controls').style.display = 'none';
        snapBtn.disabled = false;
    }

    function updateGallery() {
        galleryContainer.innerHTML = '';
        savedPhotos.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.title = "Click to enlarge";
            img.onclick = () => window.open(src, '_blank');
            galleryContainer.appendChild(img);
        });
    }

    // Disable drag
    document.addEventListener("dragstart", e => e.preventDefault());

    // ✅ Disable right-click safely
    document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
    });

	// FULLSCREEN KIOSK MODE
	function enterFullscreen() {
	    const el = document.documentElement;
	    if (el.requestFullscreen) el.requestFullscreen();
	    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
	}

	// Attempt fullscreen on first user interaction
	document.addEventListener('click', function tryFS() {
	    enterFullscreen();
 	   document.removeEventListener('click', tryFS);
	});

	// Re-enter fullscreen if exited
	document.addEventListener('fullscreenchange', () => {
 	   if (!document.fullscreenElement) {
 	       setTimeout(enterFullscreen, 500);
 	   }
	});

    initCamera();
</script>
</body>
</html>
