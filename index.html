<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dorothy & Kenneth's Photo Booth</title>

<style>
/* Disable text selection */
* {
    -webkit-user-select: none;
    user-select: none;
}

body {
    font-family: 'Georgia', serif;
    background: #fdf6f0;
    text-align: center;
    color: #5d4037;
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 800px;
    margin: auto;
}

/* Welcome screen */
#welcome-screen {
    padding: 40px 20px;
}

/* Booth */
#booth-wrapper {
    position: relative;
    border: 10px solid #fff;
    border-radius: 10px;
    background: #000;
    overflow: hidden;
}

video, #preview-img {
    width: 100%;
    display: block;
}

#preview-img {
    display: none;
}

#frame-preview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#countdown {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    color: white;
}

/* Controls */
.controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
}

button {
    background: #d4a373;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 50px;
    font-size: 1.1rem;
}

/* Gallery */
.gallery {
    margin-top: 20px;
}

.gallery-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
}

/* FLASH — screen only */
#flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}

/* PRINT — only the print image */
@media print {
    body * {
        display: none !important;
    }
    #print-area,
    #print-area * {
        display: block !important;
    }
    #print-area img {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Dorothy & Kenneth</h1>
<p>November 1, 2026 — Capture the Moment ✨</p>

<div id="welcome-screen">
    welcome.png<br><br>
    <button id="start-btn">📸 Start Photo Booth</button>
</div>

<div id="booth-ui" style="display:none;">
    <div id="booth-wrapper">
        <video id="video" autoplay muted playsinline></video>
        <img id="preview-img">
        frame.png
        <div id="countdown">3</div>
    </div>

    <div class="controls" id="main-controls">
        <button id="snap-btn">📸 Take Photo</button>
    </div>

    <div class="controls" id="review-controls" style="display:none;">
        <button id="retake-btn">🔄 Retake</button>
        <button id="save-btn">💾 Keep, Save & Print</button>
    </div>

    <div class="gallery">
        <div class="gallery-items" id="gallery-items"></div>
    </div>
</div>

<!-- PRINT-ONLY CONTAINER -->
<div id="print-area" style="display:none;">
    <img id="print-img">
</div>

<canvas id="canvas" style="display:none;"></canvas>
frame.png
</div>

<div id="flash"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const previewImg = document.getElementById('preview-img');
const printImg = document.getElementById('print-img');
const snapBtn = document.getElementById('snap-btn');
const saveBtn = document.getElementById('save-btn');
const retakeBtn = document.getElementById('retake-btn');
const countdownEl = document.getElementById('countdown');

const startBtn = document.getElementById('start-btn');
const welcomeScreen = document.getElementById('welcome-screen');
const boothUI = document.getElementById('booth-ui');

let stream;
let savedPhotos = [];
let lastCapture;

async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }
}

startBtn.onclick = () => {
    welcomeScreen.style.display = 'none';
    boothUI.style.display = 'block';
    startCamera();
};

snapBtn.onclick = () => {
    let c = 3;
    countdownEl.style.display = 'flex';
    countdownEl.textContent = c;

    const timer = setInterval(() => {
        c--;
        if (c) {
            countdownEl.textContent = c;
        } else {
            clearInterval(timer);
            countdownEl.style.display = 'none';
            capture();
        }
    }, 1000);
};

function capture() {
    const flash = document.getElementById('flash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 150);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');

    ctx.drawImage(video, 0, 0);
    lastCapture = canvas.toDataURL('image/jpeg', 1.0);

    previewImg.src = lastCapture;
    printImg.src = lastCapture;

    previewImg.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('main-controls').style.display = 'none';
    document.getElementById('review-controls').style.display = 'flex';
}

saveBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = lastCapture;
    a.download = `Wedding_${Date.now()}.jpg`;
    a.click();

    savedPhotos.unshift(lastCapture);
    updateGallery();

    window.print();
    reset();
};

retakeBtn.onclick = reset;

function reset() {
    previewImg.style.display = 'none';
    video.style.display = 'block';
    document.getElementById('main-controls').style.display = 'flex';
    document.getElementById('review-controls').style.display = 'none';
}

function updateGallery() {
    const g = document.getElementById('gallery-items');
    g.innerHTML = '';
    savedPhotos.slice(0, 20).forEach(src => {
        const i = document.createElement('img');
        i.src = src;
        g.appendChild(i);
    });
}

document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
