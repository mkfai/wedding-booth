<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dorothy & Kenneth's Photo Booth</title>

<style>
    /* Disable text selection */
    * {
        -webkit-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    body {
        font-family: 'Georgia', serif;
        background: #fdf6f0;
        text-align: center;
        color: #5d4037;
        margin: 0;
        padding: 10px;
    }

    .container { max-width: 800px; margin: auto; }

    /* Welcome screen */
    #welcome-screen {
        padding: 40px 20px;
    }

    #welcome-screen img {
        max-width: 80%;
        height: auto;
    }

    /* Booth Window */
    #booth-wrapper {
        position: relative;
        border: 10px solid #fff;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        background: #000;
        overflow: hidden;
        line-height: 0;
    }

    video, #preview-img { width: 100%; height: auto; display: block; }
    #preview-img { display: none; }

    #frame-preview {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 5;
    }

    #countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8rem;
        color: white;
        z-index: 10;
        text-shadow: 0 0 20px rgba(0,0,0,0.8);
        display: none;
    }

    .controls {
        margin-top: 15px;
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    button {
        background: #d4a373;
        color: white;
        border: none;
        padding: 12px 25px;
        font-size: 1.1rem;
        border-radius: 50px;
        cursor: pointer;
    }

    button:active { transform: scale(0.95); }
    button:disabled { background: #ccc; }

    #switch-btn {
        background: #5d4037;
        font-size: 0.8rem;
        padding: 8px 15px;
        margin-bottom: 10px;
    }

    .btn-save { background: #6b8e23; }
    .btn-retake { background: #bc4b51; }

    .gallery {
        margin-top: 30px;
        border-top: 2px solid #eaddcf;
        padding-top: 15px;
    }

    .gallery-items {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
        max-height: 300px;
        overflow-y: auto;
        padding: 15px;
    }

    .gallery-items img {
        width: 100%;
        border: 3px solid white;
        border-radius: 5px;
        cursor: pointer;
    }

    /* Flash overlay */
    #flash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        opacity: 0;
        pointer-events: none;
        z-index: 9999;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Dorothy & Kenneth</h1>
    <p>November 1, 2026 — Capture the Moment ✨</p>

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen">
        <img src="welcome.png" alt="Welcome"><br><br>
        <button id="start-btn">📸 Start Photo Booth</button>
    </div>

    <!-- BOOTH UI -->
    <div id="booth-ui" style="display:none;">
        <button id="switch-btn">🔄 Switch Camera</button>

        <div id="booth-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <img id="preview-img">
            <img src="frame.png" id="frame-preview">
            <div id="countdown">3</div>
        </div>

        <div class="controls" id="main-controls">
            <button id="snap-btn">📸 Take Photo</button>
        </div>

        <div class="controls" id="review-controls" style="display:none;">
            <button class="btn-retake" id="retake-btn">🔄 Retake</button>
            <button class="btn-save" id="save-btn">💾 Keep, Save & Print</button>
        </div>

        <div class="gallery">
            <div>Recent Gallery (Last 20 Photos)</div>
            <div class="gallery-items" id="gallery-items"></div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <img src="frame.png" id="frame-source" style="display:none;">
</div>

<div id="flash"></div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let previewImg = document.getElementById('preview-img');
let snapBtn = document.getElementById('snap-btn');
let saveBtn = document.getElementById('save-btn');
let retakeBtn = document.getElementById('retake-btn');
let switchBtn = document.getElementById('switch-btn');
let countdownEl = document.getElementById('countdown');
let frameImg = document.getElementById('frame-source');
let galleryContainer = document.getElementById('gallery-items');

let welcomeScreen = document.getElementById('welcome-screen');
let boothUI = document.getElementById('booth-ui');
let startBtn = document.getElementById('start-btn');

let currentStream;
let useFrontCamera = true;
let lastCaptureData = null;
let savedPhotos = [];

let idleTimer;
const IDLE_LIMIT = 60000;

/* AUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration) {
    const osc = audioCtx.createOscillator();
    osc.frequency.value = freq;
    osc.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/* CAMERA */
async function initCamera() {
    const constraints = {
        video: {
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            facingMode: useFrontCamera ? "user" : "environment"
        }
    };
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = currentStream;
    video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
}

function stopCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
    }
    video.srcObject = null;
}

/* FULLSCREEN */
function enterFullscreen() {
    document.documentElement.requestFullscreen?.();
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        setTimeout(enterFullscreen, 500);
    }
});

/* IDLE HANDLING */
function resetIdleTimer() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(goToWelcomeScreen, IDLE_LIMIT);
}

['click','touchstart','mousemove'].forEach(e =>
    document.addEventListener(e, resetIdleTimer)
);

function goToWelcomeScreen() {
    reset();
    stopCamera();
    boothUI.style.display = 'none';
    welcomeScreen.style.display = 'block';
}

/* START */
startBtn.onclick = () => {
    welcomeScreen.style.display = 'none';
    boothUI.style.display = 'block';
    enterFullscreen();
    initCamera();
    resetIdleTimer();
};

/* CONTROLS */
switchBtn.onclick = () => {
    useFrontCamera = !useFrontCamera;
    initCamera();
};

snapBtn.onclick = () => {
    let count = 3;
    snapBtn.disabled = true;
    countdownEl.style.display = 'block';
    countdownEl.innerText = count;

    const timer = setInterval(() => {
        if (--count) {
            playSound(440, 0.1);
            countdownEl.innerText = count;
        } else {
            clearInterval(timer);
            countdownEl.style.display = 'none';
            capture();
        }
    }, 1000);
};

function capture() {
    const flash = document.getElementById('flash');
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 200);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');

    if (useFrontCamera) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
    }

    ctx.drawImage(video, 0, 0);
    ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

    lastCaptureData = canvas.toDataURL("image/jpeg", 1.0);
    previewImg.src = lastCaptureData;

    previewImg.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('main-controls').style.display = 'none';
    document.getElementById('review-controls').style.display = 'flex';
}

saveBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = lastCaptureData;
    a.download = `Wedding_${Date.now()}.jpg`;
    a.click();

    savedPhotos.unshift(lastCaptureData);
    if (savedPhotos.length > 20) savedPhotos.pop();
    updateGallery();

    window.print();
    reset();
};

retakeBtn.onclick = reset;

function reset() {
    previewImg.style.display = 'none';
    video.style.display = 'block';
    document.getElementById('main-controls').style.display = 'flex';
    document.getElementById('review-controls').style.display = 'none';
    snapBtn.disabled = false;
}

function updateGallery() {
    galleryContainer.innerHTML = '';
    savedPhotos.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.onclick = () => window.open(src,'_blank');
        galleryContainer.appendChild(img);
    });
}

/* SECURITY */
document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
