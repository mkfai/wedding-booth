<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dorothy & Kenneth's Photo Booth</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fdf6f0; text-align: center; color: #5d4037; margin: 0; padding: 10px; user-select: none; -webkit-user-select: none; }
        .container { max-width: 800px; margin: auto; position: relative; }
        
        /* THE START SCREEN - HIGHEST PRIORITY */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fdf6f0; /* Fallback color */
            background-image: url('start_screen.png'); 
            background-size: cover; background-position: center;
            z-index: 9999; /* Front of everything */
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            border-radius: 10px; border: 10px solid #fff; box-sizing: border-box;
            padding-bottom: 60px;
        }

        #booth-wrapper { 
            position: relative; border: 10px solid #fff; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #000; overflow: hidden; line-height: 0;
            min-height: 400px; /* Prevents collapse before camera loads */
        }
        video, #preview-img { width: 100%; height: auto; display: block; background: #000; }
        #preview-img { display: none; }
        #frame-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; z-index: 50; pointer-events: none; }

        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { background: #d4a373; color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-start { background: #5d4037; font-size: 1.6rem; padding: 25px 60px; font-weight: bold; }
        .btn-save { background: #6b8e23; }
        .btn-retake { background: #bc4b51; }

        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: white; z-index: 20; text-shadow: 0 0 20px rgba(0,0,0,0.8); display: none; }

        .gallery { margin-top: 30px; border-top: 2px solid #eaddcf; padding-top: 15px; background: rgba(255, 255, 255, 0.4); border-radius: 15px; }
        .gallery-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; max-height: 300px; overflow-y: auto; padding: 15px; }
        .gallery-items img { width: 100%; height: auto; border: 3px solid white; border-radius: 5px; cursor: pointer; }

        @media print {
            body * { visibility: hidden; }
            #booth-wrapper, #booth-wrapper * { visibility: visible; }
            #booth-wrapper { position: absolute; left: 0; top: 0; width: 100% !important; border: none !important; }
        }
    </style>
</head>
<body onclick="resetInactivityTimer()">

<div class="container">
    <div id="start-overlay">
        <button class="btn-start" onclick="activateBooth()">✨ Tap to Start</button>
    </div>

    <h1>Dorothy & Kenneth</h1>
    
    <div id="booth-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview-img">
        <img src="frame.png" id="frame-preview">
        <div id="countdown">3</div>
        <div id="flash"></div>
    </div>

    <div class="controls" id="main-controls">
        <button id="snap-btn">📸 Take Photo</button>
    </div>

    <div class="controls" id="review-controls" style="display:none;">
        <button class="btn-retake" id="retake-btn">🔄 Retake</button>
        <button class="btn-save" id="save-btn">💾 Save & Print</button>
    </div>

    <div class="gallery">
<div class="gallery-title">Recent Wedding Memories</div>
        <div id="gallery-items" class="gallery-items"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <img src="frame.png" id="frame-source" style="display:none;">
</div>

<script>
    // --- 1. GLOBALLY DEFINE THE FUNCTIONS FIRST ---
// This ensures 'activateBooth' is defined before the HTML button is clicked.

let currentStream;
let savedPhotos = JSON.parse(localStorage.getItem('weddingGallery')) || [];
let inactivityTimer;

// This function MUST be global
window.activateBooth = async function() {
    console.log("Activating Booth...");
    const startOverlay = document.getElementById('start-overlay');
    
    if (startOverlay) {
        startOverlay.style.display = 'none';
    }
    
    await initCamera();
    resetInactivityTimer();
};

async function initCamera() {
    const video = document.getElementById('video');
    
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
    }
    
    const constraints = { 
        video: { 
            width: { ideal: 3840 }, 
            height: { ideal: 2160 } 
        } 
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        console.log("Sony A7C2 / Camera linked successfully.");
    } catch (e) {
        console.error("Camera Access Error:", e);
        alert("Camera failed to start. Please check the USB connection to your Sony A7C2.");
        document.getElementById('start-overlay').style.display = 'flex';
    }
}

// --- 2. SETUP REMAINING LOGIC AFTER DOM LOADS ---
document.addEventListener('DOMContentLoaded', () => {
    const snapBtn = document.getElementById('snap-btn');
    const saveBtn = document.getElementById('save-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const galleryContainer = document.getElementById('gallery-items');
    
    // Initial gallery render
    updateGallery();

    // Inactivity / Auto-Sleep Logic
    window.resetInactivityTimer = function() {
        clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(() => {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            document.getElementById('start-overlay').style.display = 'flex';
            resetBoothUI();
        }, 300000); // 5 Minutes
    };

    // --- SNAP LOGIC ---
    snapBtn.addEventListener('click', () => {
        const countdownEl = document.getElementById('countdown');
        let count = 3;
        snapBtn.disabled = true;
        countdownEl.style.display = 'block';
        countdownEl.innerText = count;
        
        const timer = setInterval(() => {
            if (count > 1) { 
                count--; 
                countdownEl.innerText = count; 
            } else { 
                clearInterval(timer); 
                countdownEl.style.display = 'none'; 
                triggerFlash(); 
            }
        }, 1000);
    });

    function triggerFlash() {
        const flashEl = document.getElementById('flash');
        flashEl.style.opacity = '1';
        setTimeout(() => {
            capture();
            flashEl.style.opacity = '0';
            flashEl.style.transition = 'opacity 0.5s ease-out';
        }, 50);
    }

    function capture() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const frameImg = document.getElementById('frame-source');
        const previewImg = document.getElementById('preview-img');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (frameImg.complete) {
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }
        
        window.lastCaptureData = canvas.toDataURL("image/jpeg", 1.0);
        previewImg.src = window.lastCaptureData;
        previewImg.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('main-controls').style.display = 'none';
        document.getElementById('review-controls').style.display = 'flex';
    }

    saveBtn.addEventListener('click', () => {
        const link = document.
createElement('a');
        link.download = Wedding_${Date.now()}.jpg;
        link.href = window.lastCaptureData;
        link.click();

        savedPhotos.unshift(window.lastCaptureData);
        if (savedPhotos.length > 20) savedPhotos.pop();
        localStorage.setItem('weddingGallery', JSON.stringify(savedPhotos));
        
        updateGallery();
        window.print();
        resetBoothUI();
    });

    retakeBtn.addEventListener('click', resetBoothUI);

    function resetBoothUI() {
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('video').style.display = 'block';
        document.getElementById('main-controls').style.display = 'flex';
        document.getElementById('review-controls').style.display = 'none';
        snapBtn.disabled = false;
    }

    function updateGallery() {
        galleryContainer.innerHTML = '';
        savedPhotos.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.onclick = () => window.open(src, '_blank');
            galleryContainer.appendChild(img);
        });
    }
});
</script>
</body>
</html>
