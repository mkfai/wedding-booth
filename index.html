<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dorothy & Kenneth's Photo Booth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * { -webkit-user-select: none; -ms-user-select: none; user-select: none; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #fdf6f0; text-align: center; color: #5d4037; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 800px; margin: auto; }
        
        #booth-wrapper { 
            position: relative; border: 10px solid #fff; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #000; overflow: hidden; line-height: 0;
        }
        video, #preview-img { width: 100%; height: auto; display: block; }
        #preview-img { display: none; }
        #frame-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 20; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: white; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,0.8); display: none; }

        #qr-container {
            display: none; flex-direction: column; align-items: center; background: white; 
            padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            margin: 20px auto; width: fit-content;
        }
        #qrcode { margin-bottom: 10px; border: 10px solid white; }
        #qr-status { font-size: 1rem; font-weight: bold; color: #d4a373; margin-bottom: 10px; }

        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { background: #d4a373; color: white; border: none; padding: 12px 25px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-save { background: #6b8e23; }
        .btn-retake { background: #bc4b51; }

        .gallery { margin-top: 30px; border-top: 2px solid #eaddcf; padding-top: 15px; background: rgba(255, 255, 255, 0.4); border-radius: 15px; }
        .gallery-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; max-height: 300px; overflow-y: auto; padding: 15px; }
        .gallery-items img { width: 100%; height: auto; border: 3px solid white; border-radius: 5px; }

        @media print {
            @page { size: landscape; margin: 0; }
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .container > *:not(#booth-ui) { display: none !important; }
            #booth-ui > *:not(#booth-wrapper) { display: none !important; }
            #booth-wrapper { border: none !important; box-shadow: none !important; width: 100% !important; }
            #preview-img { display: block !important; width: 100% !important; height: 100vh !important; object-fit: contain !important; }
            #frame-preview, #flash, #countdown, video { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dorothy & Kenneth</h1>
    <p>November 1, 2026 — Capture the Moment ✨</p>   

    <div id="welcome-screen">
        <img src="welcome.png" alt="Welcome" style="max-width:80%; height:auto;">
        <br><br>
        <button id="start-btn">📸 Start Photo Booth</button>
    </div>	

    <div id="booth-ui" style="display:none;">
        <button id="switch-btn">🔄 Switch Camera</button>

        <div id="booth-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <img id="preview-img">
            <img src="frame.png" id="frame-preview">
            <div id="flash"></div>
            <div id="countdown">3</div>
        </div>

        <div id="qr-container">
            <div id="qr-status">Generating QR...</div>
            <div id="qrcode"></div>
            <p>Scan to download! ☁️</p>
            <button onclick="reset()" style="background:#5d4037; padding: 8px 15px; font-size: 0.9rem;">Done / Next Guest</button>
        </div>

        <div class="controls" id="main-controls">
            <button id="snap-btn">📸 Take Photo</button>
        </div>

        <div class="controls" id="review-controls" style="display:none;">
            <button class="btn-retake" onclick="reset()">🔄 Retake</button>
            <button class="btn-save" id="save-btn">💾 Keep, Save & Print</button>
        </div>

        <div class="gallery">
            <div class="gallery-title">Recent Gallery (Last 20)</div>
            <div class="gallery-items" id="gallery-items"></div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <img src="frame.png" id="frame-source" style="display:none;">
</div>

<script>
    const IMGBB_API_KEY = "836c6b9552bdcd27a11b3c86a73ee93e";
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('preview-img');
    const snapBtn = document.getElementById('snap-btn');
    const saveBtn = document.getElementById('save-btn');
    const switchBtn = document.getElementById('switch-btn');
    const countdownEl = document.getElementById('countdown');
    const flashEl = document.getElementById('flash');
    const frameImg = document.getElementById('frame-source');
    const galleryContainer = document.getElementById('gallery-items');
    const welcomeScreen = document.getElementById('welcome-screen');
    const boothUI = document.getElementById('booth-ui');
    const startBtn = document.getElementById('start-btn');
    const qrContainer = document.getElementById('qr-container');
    const qrDiv = document.getElementById('qrcode');
    const qrStatus = document.getElementById('qr-status');

    let currentStream;
    let useFrontCamera = true;
    let lastCaptureData = null;
    let savedPhotos = [];
    let idleTimer;
    const IDLE_TIMEOUT = 60000;

    async function initCamera() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        const constraints = { 
            video: { 
                width: { ideal: 3840 }, 
                height: { ideal: 2160 }, 
                facingMode: useFrontCamera ? "user" : "environment" 
            } 
        };
        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
        } catch (e) {
            console.error("Camera access failed:", e);
        }
    }

    startBtn.addEventListener('click', () => {
        welcomeScreen.style.display = 'none';
        boothUI.style.display = 'block';
        initCamera();
        resetIdleTimer();
    });

    switchBtn.addEventListener('click', () => {
        if (snapBtn.disabled) return;
        useFrontCamera = !useFrontCamera;
        initCamera();
    });

    snapBtn.addEventListener('click', () => {
        let count = 3;
        snapBtn.disabled = true;
        countdownEl.style.display = 'block';
        countdownEl.innerText = count;
        
        const timer = setInterval(() => {
            if (count > 1) {
                count--;
                countdownEl.innerText = count;
            } else {
                clearInterval(timer);
                countdownEl.style.display = 'none';
                
                flashEl.style.transition = 'none';
                flashEl.style.opacity = '1';
                setTimeout(() => {
                    capture();
                    setTimeout(() => {
                        flashEl.style.transition = 'opacity 0.4s ease-out';
                        flashEl.style.opacity = '0';
                    }, 50);
                }, 100); 
            }
        }, 1000);
    });

    function capture() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.save();
        if (useFrontCamera) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        if (frameImg.complete) ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        
        lastCaptureData = canvas.toDataURL("image/jpeg", 1.0);
        previewImg.src = lastCaptureData;
        previewImg.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('main-controls').style.display = 'none';
        document.getElementById('review-controls').style.display = 'flex';
    }

    saveBtn.addEventListener('click', async () => {
        document.getElementById('review-controls').style.display = 'none';
        qrContainer.style.display = 'flex';
        qrDiv.innerHTML = "";
        qrStatus.innerText = "☁️ Preparing Print & QR...";

        // 1. Instant Print (Safari works best if this is immediate)
        window.print();

        // 2. Instant Download (Skip on iOS to prevent blocking)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (!isIOS) {
            const link = document.createElement('a');
            link.download = `Wedding_${Date.now()}.jpg`;
            link.href = lastCaptureData;
            link.click();
        }

        // 3. Upload for QR
        try {
            const base64Data = lastCaptureData.split(',')[1];
            const formData = new FormData();
            formData.append("image", base64Data);

            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            
            new QRCode(qrDiv, { text: result.data.url, width: 180, height: 180, colorDark: "#5d4037" });
            qrStatus.innerText = "✅ Ready to Scan!";

            savedPhotos.unshift(lastCaptureData);
            if (savedPhotos.length > 20) savedPhotos.pop();
            updateGallery();
        } catch (error) {
            qrStatus.innerText = "❌ Upload Failed";
        }
    });

    // ✅ FIXED GLOBAL RESET FUNCTION
    async function reset() {
        console.log("Resetting booth...");
        previewImg.style.display = 'none';
        video.style.display = 'block';
        document.getElementById('main-controls').style.display = 'flex';
        document.getElementById('review-controls').style.display = 'none';
        qrContainer.style.display = 'none';
        snapBtn.disabled = false;

        // Force camera restart for iOS after print dialog
        if (!currentStream || !currentStream.active) {
            await initCamera();
        }
    }

    function updateGallery() {
        galleryContainer.innerHTML = '';
        savedPhotos.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            galleryContainer.appendChild(img);
        });
    }

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            boothUI.style.display = 'none';
            qrContainer.style.display = 'none';
            welcomeScreen.style.display = 'block';
        }, IDLE_TIMEOUT);
    }
    ['click', 'touchstart'].forEach(evt => document.addEventListener(evt, resetIdleTimer));
</script>
</body>
</html>
