<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
    /* New Button Style */
    .btn-switch { background: #5d4037; margin-bottom: 10px; }
    #qr-code-container { 
        position: absolute; bottom: 20px; right: 20px; 
        background: white; padding: 10px; border-radius: 5px; display: none; 
    }
</style>

<div class="controls">
    <button class="btn-switch" id="switch-btn">🔄 Switch Camera</button>
</div>

<div id="booth-wrapper">
    <video id="video" autoplay playsinline muted></video>
    <div id="qr-code-container">
        <div id="qrcode"></div>
        <p style="font-size: 10px; color: black; margin: 5px 0 0 0;">Scan to view Gallery</p>
    </div>
    </div>

<script>
    let currentStream;
    let useFrontCamera = true;
    const switchBtn = document.getElementById('switch-btn');

    // Updated Camera Function to handle toggling
    async function startCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const constraints = {
            video: { 
                facingMode: useFrontCamera ? "user" : "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            
            // Mirror ONLY if using front camera
            video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            
            statusLog.innerText = "Camera Active!";
        } catch (err) {
            console.error(err);
            statusLog.innerText = "Switch failed. Some browsers block rapid switching.";
        }
    }

    switchBtn.addEventListener('click', () => {
        useFrontCamera = !useFrontCamera;
        startCamera();
    });

    // To show a QR code on the "Save" screen:
    function showQRCode(url) {
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = ""; // Clear old one
        new QRCode(qrDiv, {
            text: url,
            width: 80,
            height: 80
        });
        document.getElementById("qr-code-container").style.display = "block";
    }
</script>
