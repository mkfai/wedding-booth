<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dorothy & Kenneth's Photo Booth</title>

<style>
/* Disable text selection */
* {
    -webkit-user-select: none;
    user-select: none;
}

body {
    font-family: 'Georgia', serif;
    background: #fdf6f0;
    text-align: center;
    color: #5d4037;
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 800px;
    margin: auto;
}

/* Welcome screen */
#welcome-screen {
    padding: 40px 20px;
}

#welcome-screen img {
    max-width: 80%;
    height: auto;
}

/* Booth window */
#booth-wrapper {
    position: relative;
    border: 10px solid #fff;
    border-radius: 10px;
    background: #000;
    overflow: hidden;
}

video,
#preview-img {
    width: 100%;
    display: block;
}

#preview-img {
    display: none;
}

/* Frame overlay */
#frame-preview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
}

/* Countdown */
#countdown {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    color: white;
    z-index: 10;
}

/* Controls */
.controls {
    margin-top: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    background: #d4a373;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 1.1rem;
    border-radius: 50px;
    cursor: pointer;
}

.gallery {
    margin-top: 20px;
}

.gallery-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
    gap: 10px;
}

/* Flash overlay (screen only) */
#flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}

/* ✅ PRINT – only captured image */
@media print {
    @page { size: landscape; margin: 0; }
    body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    body * {
        display: none !important;
    }

    #booth-wrapper,
    #booth-wrapper * {
        display: block !important;
    }

    video {
        display: none !important;
    }

    #preview-img {
        display: block !important;
        width: 100% !important;
    }

    #flash {
        display: none !important;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Dorothy & Kenneth</h1>
<p>November 1, 2026 — Capture the Moment ✨</p>

<!-- ✅ WELCOME SCREEN -->
<div id="welcome-screen">
    <img src="welcome.png" alt="Welcome"><br><br>
    <button id="start-btn">📸 Start Photo Booth</button>
</div>

<!-- BOOTH UI -->
<div id="booth-ui" style="display:none;">

    <div id="booth-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview-img">
        <img src="frame.png" id="frame-preview">
        <div id="countdown">3</div>
    </div>

    <div class="controls" id="main-controls">
        <button id="snap-btn">📸 Take Photo</button>
    </div>

    <div class="controls" id="review-controls" style="display:none;">
        <button id="retake-btn">🔄 Retake</button>
        <button id="save-btn">💾 Keep, Save & Print</button>
    </div>

    <div class="gallery">
        <div class="gallery-items" id="gallery-items"></div>
    </div>

</div>

<!-- Hidden capture resources -->
<canvas id="canvas" style="display:none;"></canvas>
<img src="frame.png" id="frame-source" style="display:none;">

</div>

<div id="flash"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const previewImg = document.getElementById('preview-img');
const frameImg = document.getElementById('frame-source');
const snapBtn = document.getElementById('snap-btn');
const saveBtn = document.getElementById('save-btn');
const retakeBtn = document.getElementById('retake-btn');
const countdownEl = document.getElementById('countdown');
const flash = document.getElementById('flash');

const welcomeScreen = document.getElementById('welcome-screen');
const boothUI = document.getElementById('booth-ui');
const startBtn = document.getElementById('start-btn');
const gallery = document.getElementById('gallery-items');

let stream, lastCapture, savedPhotos = [];
let idleTimer;
const IDLE_MS = 60000;

/* Camera control */
async function startCamera() {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }
}

/* Welcome → booth */
startBtn.onclick = () => {
    welcomeScreen.style.display = 'none';
    boothUI.style.display = 'block';
    startCamera();
    resetIdle();
};

/* Idle handling */
function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
        stopCamera();
        boothUI.style.display = 'none';
        welcomeScreen.style.display = 'block';
    }, IDLE_MS);
}

['click','touchstart','mousemove']
    .forEach(e => document.addEventListener(e, resetIdle));

/* Capture */
snapBtn.onclick = () => {
    let c = 3;
    countdownEl.style.display = 'flex';
    countdownEl.textContent = c;

    const timer = setInterval(() => {
        if (--c) {
            countdownEl.textContent = c;
        } else {
            clearInterval(timer);
            countdownEl.style.display = 'none';
            capture();
        }
    }, 1000);
};

function capture() {
    flash.style.opacity = '1';
    setTimeout(() => flash.style.opacity = '0', 150);

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

    lastCapture = canvas.toDataURL('image/jpeg', 1);
    previewImg.src = lastCapture;

    previewImg.style.display = 'block';
    video.style.display = 'none';
    document.getElementById('main-controls').style.display = 'none';
    document.getElementById('review-controls').style.display = 'flex';
}

/* Save / print */
saveBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = lastCapture;
    a.download = `Wedding_${Date.now()}.jpg`;
    a.click();

    savedPhotos.unshift(lastCapture);
    updateGallery();

    flash.style.opacity = '0';
    setTimeout(() => window.print(), 100);

    resetBooth();
};

retakeBtn.onclick = resetBooth;

function resetBooth() {
    previewImg.style.display = 'none';
    video.style.display = 'block';
    document.getElementById('main-controls').style.display = 'flex';
    document.getElementById('review-controls').style.display = 'none';
}

/* Gallery */
function updateGallery() {
    gallery.innerHTML = '';
    savedPhotos.slice(0,20).forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        gallery.appendChild(img);
    });
}

/* Disable right-click */
document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
